<script>
/**
 * THE TAPE — Improvement #1: Live "Points at Stake" indicator
 *
 * Watches the DOM for the active clue card and injects a gold badge
 * showing exactly how many points a correct guess is worth right now.
 * The score formula mirrors the game's own clueScore() fn: 6 - clueIndex.
 *
 * Clue 1 revealed  → guess worth 5 pts
 * Clue 2 revealed  → guess worth 4 pts
 * ...
 * Clue 6 revealed  → guess worth 0 pts (give-up state)
 */
(function () {
  const GOLD = '#C8A96E';
  const GOLD_BG = 'rgba(200,169,110,0.08)';
  const GOLD_BORDER = 'rgba(200,169,110,0.30)';

  // Badge element, created once and reused
  let badge = null;

  function makeBadge() {
    const el = document.createElement('div');
    el.id = 'pts-stake-badge';
    Object.assign(el.style, {
      position: 'fixed',
      bottom: '0',
      left: '50%',
      transform: 'translateX(-50%)',
      zIndex: '9999',
      display: 'flex',
      alignItems: 'center',
      gap: '6px',
      background: GOLD_BG,
      border: `1px solid ${GOLD_BORDER}`,
      borderRadius: '8px 8px 0 0',
      padding: '7px 18px 6px',
      fontFamily: "'Space Mono', monospace",
      fontSize: '0.68rem',
      letterSpacing: '0.06em',
      color: GOLD,
      pointerEvents: 'none',
      transition: 'opacity 0.25s ease',
      backdropFilter: 'blur(4px)',
      WebkitBackdropFilter: 'blur(4px)',
    });

    // Dot accent
    const dot = document.createElement('span');
    dot.textContent = '●';
    Object.assign(dot.style, { fontSize: '0.45rem', opacity: '0.7' });
    el.appendChild(dot);

    // Text node we'll update
    const txt = document.createElement('span');
    txt.id = 'pts-stake-text';
    el.appendChild(txt);

    document.body.appendChild(el);
    return el;
  }

  /**
   * Count how many clue cards are currently VISIBLE (not locked/dimmed).
   * The game dims future cards with opacity < 1 and renders locked placeholders
   * with a distinct style. We count cards that have opacity === '1' or no opacity
   * set and contain actual clue text (not "LOCKED").
   *
   * Heuristic: look for the hudBar's "CLUE" cell which shows "X/6".
   * That's the most reliable signal the game already computes.
   */
  function getCurrentClueIndex() {
    // The HUD shows clue progress as text like "2/6" or "3/6".
    // Walk all spans/divs for that pattern.
    const all = document.querySelectorAll('span, div');
    for (const el of all) {
      const t = el.textContent.trim();
      const m = t.match(/^(\d)\/6$/);
      if (m) {
        const idx = parseInt(m[1], 10); // 1-based clue number currently shown
        return idx - 1;                  // convert to 0-based index
      }
    }
    return -1; // game not in playing state
  }

  function isGameOver() {
    // Game over / round end: the ✓ or reveal box is present, or no input visible
    const input = document.querySelector('input');
    return !input;
  }

  function updateBadge() {
    if (!badge) badge = makeBadge();

    if (isGameOver()) {
      badge.style.opacity = '0';
      return;
    }

    const idx = getCurrentClueIndex();
    if (idx < 0) {
      badge.style.opacity = '0';
      return;
    }

    const pts = 5 - idx; // clue 0 → 5 pts, clue 5 → 0 pts
    const txt = document.getElementById('pts-stake-text');

    if (pts <= 0) {
      txt.textContent = 'Last clue — guess scores 0 pts';
    } else if (pts === 5) {
      txt.textContent = `Guess now → ${pts} pts  (max)`;
    } else {
      const skipsLeft = 5 - idx;
      txt.textContent = `Guess now → ${pts} pt${pts !== 1 ? 's' : ''}`;
    }

    badge.style.opacity = '1';
  }

  // Poll every 400 ms — cheap enough, avoids needing to hook into React internals
  setInterval(updateBadge, 400);

  // Also fire immediately after first render settles
  setTimeout(updateBadge, 800);
})();
</script>

<script>
/**
 * THE TAPE — Improvement #2: Skip / Pass penalty tracker
 *
 * Watches how many clues have been revealed without a guess being made.
 * Each time a new clue unlocks (player pressed Skip / Give Up early),
 * we increment the skip count and show it as a row of pip icons in the
 * points badge from Improvement #1, so players feel the cost of each pass.
 *
 * Visual:  SKIPS USED  ○ ● ● ○ ○   (2 of 5 used)
 *
 * Strategy: We track the last-seen clue index. Every time it goes UP
 * without a correct guess being registered, that's a skip. We reset
 * when a new player round starts (clue index drops back to 0).
 */
(function () {
  const GOLD       = '#C8A96E';
  const RED        = '#F87171';
  const DIM        = '#3A3530';
  const USED_COLOR = '#F87171';
  const FREE_COLOR = '#3A3530';

  let lastClueIdx   = -1;   // clue index we saw on the previous poll tick
  let skipsUsed     = 0;    // how many passes taken this round
  let lastWasGameOver = true; // so we detect the transition into a new round

  // ── DOM helpers ──────────────────────────────────────────────────────────

  function getClueIndex() {
    const all = document.querySelectorAll('span, div');
    for (const el of all) {
      const t = el.textContent.trim();
      const m = t.match(/^(\d)\/6$/);
      if (m) return parseInt(m[1], 10) - 1; // 0-based
    }
    return -1;
  }

  function isGameOver() {
    return !document.querySelector('input');
  }

  // ── Skip tracker UI ──────────────────────────────────────────────────────

  let trackerEl = null;

  function makeTracker() {
    const wrap = document.createElement('div');
    wrap.id = 'skip-tracker';
    Object.assign(wrap.style, {
      position:        'fixed',
      bottom:          '44px',          // sits just above the pts badge
      left:            '50%',
      transform:       'translateX(-50%)',
      zIndex:          '9998',
      display:         'flex',
      alignItems:      'center',
      gap:             '8px',
      background:      'rgba(12,11,8,0.82)',
      border:          '1px solid rgba(255,255,255,0.07)',
      borderRadius:    '8px 8px 0 0',
      padding:         '5px 14px 4px',
      fontFamily:      "'Space Mono', monospace",
      fontSize:        '0.58rem',
      letterSpacing:   '0.10em',
      color:           '#5C5448',
      pointerEvents:   'none',
      transition:      'opacity 0.25s ease',
      backdropFilter:  'blur(4px)',
      WebkitBackdropFilter: 'blur(4px)',
      textTransform:   'uppercase',
      opacity:         '0',
    });

    // Label
    const lbl = document.createElement('span');
    lbl.textContent = 'Skips';
    wrap.appendChild(lbl);

    // Pip container
    const pips = document.createElement('div');
    pips.id = 'skip-pips';
    Object.assign(pips.style, {
      display: 'flex',
      gap: '4px',
      alignItems: 'center',
    });
    wrap.appendChild(pips);

    // Cost note
    const cost = document.createElement('span');
    cost.id = 'skip-cost';
    Object.assign(cost.style, {
      marginLeft: '2px',
      fontSize: '0.54rem',
      opacity: '0.7',
    });
    wrap.appendChild(cost);

    document.body.appendChild(wrap);
    return wrap;
  }

  function renderPips(used, total) {
    const container = document.getElementById('skip-pips');
    if (!container) return;
    container.innerHTML = '';
    for (let i = 0; i < total; i++) {
      const pip = document.createElement('span');
      Object.assign(pip.style, {
        display:       'inline-block',
        width:         '7px',
        height:        '7px',
        borderRadius:  '50%',
        background:    i < used ? USED_COLOR : FREE_COLOR,
        transition:    'background 0.2s ease',
        flexShrink:    '0',
      });
      container.appendChild(pip);
    }

    // Update cost note
    const costEl = document.getElementById('skip-cost');
    if (costEl) {
      const ptsLost = used; // each skip = 1 fewer pt available
      costEl.textContent = used === 0
        ? '— no pts lost yet'
        : `— ${ptsLost} pt${ptsLost !== 1 ? 's' : ''} lost`;
      costEl.style.color = used > 0 ? RED : '#5C5448';
    }
  }

  // ── Main update loop ──────────────────────────────────────────────────────

  function update() {
    if (!trackerEl) trackerEl = makeTracker();

    const gameOver = isGameOver();
    const idx      = getClueIndex();

    // Transition: game over → new round starting
    // MUST run before skip detection to prevent phantom skip on idx -1 → 0
    if (lastWasGameOver && !gameOver && idx === 0) {
      skipsUsed   = 0;
      lastClueIdx = 0;
      lastWasGameOver = false;
      renderPips(0, 5);
      // Skip detection this tick — index jump is round start, not a pass
      trackerEl.style.opacity = '1';
      return;
    }

    // Reset lastClueIdx when game ends so it doesn't bleed into next round
    if (gameOver && !lastWasGameOver) {
      lastClueIdx = -1;
    }

    // Detect a skip: clue index went up without a round reset
    if (!gameOver && idx > lastClueIdx && lastClueIdx >= 0) {
      const jumped = idx - lastClueIdx;
      skipsUsed = Math.min(skipsUsed + jumped, 5);
    }

    if (!gameOver && idx >= 0) {
      lastClueIdx = idx;
    }

    lastWasGameOver = gameOver;

    // Show/hide
    if (gameOver || idx < 0) {
      trackerEl.style.opacity = '0';
      return;
    }

    trackerEl.style.opacity = '1';
    renderPips(skipsUsed, 5);
  }

  setInterval(update, 400);
  setTimeout(update, 900);
})();
</script>

<script>
/**
 * THE TAPE — Improvement #3: Clue reveal animation
 *
 * Uses a MutationObserver to watch for new clue cards entering the DOM.
 * Each newly added card gets a quick slide-down + fade-in so reveals
 * feel deliberate rather than instant pops.
 *
 * Detection: we identify clue cards by looking for elements that use
 * Space Mono font (the clue number/label cells) inside a newly added
 * subtree. We tag each card with a data attribute so we only animate it once.
 */
(function () {
  // Inject keyframe CSS once
  const style = document.createElement('style');
  style.textContent = `
    @keyframes tapeClueDrop {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    .tape-clue-animate {
      animation: tapeClueDrop 0.28s cubic-bezier(0.22, 1, 0.36, 1) both;
    }
  `;
  document.head.appendChild(style);

  let animationQueue = [];
  let isAnimating = false;

  function animateNext() {
    if (animationQueue.length === 0) { isAnimating = false; return; }
    isAnimating = true;
    const card = animationQueue.shift();

    // Reset so animation can re-trigger
    card.classList.remove('tape-clue-animate');
    // Force reflow
    void card.offsetWidth;
    card.classList.add('tape-clue-animate');

    setTimeout(animateNext, 160); // stagger between cards
  }

  function enqueueCard(card) {
    if (card.dataset.tapeAnimated) return;
    card.dataset.tapeAnimated = '1';
    animationQueue.push(card);
    if (!isAnimating) animateNext();
  }

  /**
   * Try to identify a clue card from a candidate element.
   * Clue cards contain a child element using Space Mono and have
   * a sibling/parent structure typical of the game's card layout.
   * We look for the outermost card wrapper by walking up until we
   * hit something that looks like a card container.
   */
  function findClueCard(el) {
    // Walk up to find a container that has a reasonable card shape
    // (has padding, has multiple children, isn't body/html)
    let cur = el;
    for (let i = 0; i < 6; i++) {
      if (!cur || cur === document.body) return null;
      const cs = window.getComputedStyle(cur);
      const text = cur.textContent || '';
      // Clue cards tend to have one of these category labels
      if (/BACKGROUND|DRAFT|CAREER|HARDWARE|FRANCHISE|THE TELL/i.test(text)
          && cur.children.length >= 1
          && cs.display !== 'inline') {
        return cur;
      }
      cur = cur.parentElement;
    }
    return null;
  }

  // Debounce: batch mutations into 16ms window to reduce per-tick work on React apps
  let _pendingNodes = [];
  let _debounceTimer = null;

  function processPendingNodes() {
    _debounceTimer = null;
    const nodes = _pendingNodes.splice(0);
    for (const node of nodes) {
      const candidates = [node, ...node.querySelectorAll('*')];
      for (const candidate of candidates) {
        const card = findClueCard(candidate);
        if (card) enqueueCard(card);
      }
    }
  }

  const observer = new MutationObserver((mutations) => {
    for (const mutation of mutations) {
      for (const node of mutation.addedNodes) {
        if (node.nodeType !== 1) continue;
        _pendingNodes.push(node);
      }
    }
    if (!_debounceTimer) _debounceTimer = setTimeout(processPendingNodes, 16);
  });

  // Start observing once the root mounts
  function startObserving() {
    const root = document.getElementById('root') || document.body;
    observer.observe(root, { childList: true, subtree: true });
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', startObserving);
  } else {
    startObserving();
  }
})();
</script>

<script>
/**
 * THE TAPE — Improvement #4: Wrong-guess feedback
 *
 * When the player submits an incorrect guess, shake the input field
 * and flash its border red. Much more visceral than a text message alone.
 *
 * Detection strategy: watch for the game's wrong-guess message appearing
 * in the DOM (it typically contains "Try again" or similar text), then
 * immediately trigger the animation on the input element.
 *
 * Fallback: also intercept the Enter key / Guess button click and check
 * a moment later whether the input was cleared without a win — that's a wrong guess.
 */
(function () {
  const RED        = '#F87171';
  const RED_GLOW   = 'rgba(248,113,113,0.25)';
  const SHAKE_MS   = 420;

  // Inject keyframes once
  const style = document.createElement('style');
  style.textContent = `
    @keyframes tapeShake {
      0%   { transform: translateX(0); }
      15%  { transform: translateX(-6px); }
      35%  { transform: translateX(5px); }
      55%  { transform: translateX(-4px); }
      75%  { transform: translateX(3px); }
      90%  { transform: translateX(-2px); }
      100% { transform: translateX(0); }
    }
    .tape-wrong-shake {
      animation: tapeShake ${SHAKE_MS}ms cubic-bezier(0.36, 0.07, 0.19, 0.97) both !important;
    }
    .tape-wrong-border {
      border-color: ${RED} !important;
      box-shadow: 0 0 0 3px ${RED_GLOW} !important;
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }
  `;
  document.head.appendChild(style);

  function triggerWrongFeedback() {
    const input = document.querySelector('input');
    if (!input) return;

    // Walk up to find the input's wrapper (the styled container div)
    let wrapper = input;
    for (let i = 0; i < 5; i++) {
      if (!wrapper.parentElement || wrapper.parentElement === document.body) break;
      wrapper = wrapper.parentElement;
      const cs = window.getComputedStyle(wrapper);
      if (cs.borderWidth && cs.borderWidth !== '0px' && cs.borderStyle !== 'none') break;
    }

    // Apply shake to wrapper, border flash to both
    wrapper.classList.remove('tape-wrong-shake');
    void wrapper.offsetWidth; // reflow
    wrapper.classList.add('tape-wrong-shake');
    wrapper.classList.add('tape-wrong-border');
    input.classList.add('tape-wrong-border');

    setTimeout(() => {
      wrapper.classList.remove('tape-wrong-shake', 'tape-wrong-border');
      input.classList.remove('tape-wrong-border');
    }, SHAKE_MS + 300);
  }

  // ── Strategy 1: Watch for wrong-guess message node appearing ─────────────
  // The game renders a transient "incorrect" / "try again" type message.
  // We watch for any new text node that matches known wrong-guess strings.

  const WRONG_PATTERNS = [
    /try again/i,
    /incorrect/i,
    /not quite/i,
    /wrong/i,
    /not (the|a) player/i,
  ];

  function looksLikeWrongMsg(text) {
    return WRONG_PATTERNS.some(p => p.test(text));
  }

  const msgObserver = new MutationObserver((mutations) => {
    for (const mutation of mutations) {
      for (const node of mutation.addedNodes) {
        if (node.nodeType === 3) { // text node
          if (looksLikeWrongMsg(node.textContent)) {
            triggerWrongFeedback();
            return;
          }
        }
        if (node.nodeType === 1) {
          if (looksLikeWrongMsg(node.textContent)) {
            triggerWrongFeedback();
            return;
          }
        }
      }
    }
  });

  // ── Strategy 2: Intercept guess submission, check result after 120ms ─────
  // If the input value is cleared but no win state appeared → wrong guess.

  let lastInputValue = '';
  let lastClueIdx = -1;

  function getClueIndex() {
    const all = document.querySelectorAll('span, div');
    for (const el of all) {
      const m = el.textContent.trim().match(/^(\d)\/6$/);
      if (m) return parseInt(m[1], 10) - 1;
    }
    return -1;
  }

  function isWinState() {
    // Win: input disappears AND a result container appears with a success signal.
    // Scope check to elements that are NOT clue cards to avoid matching clue body text
    // (e.g. "correct knee injury" or "Nice, IL" would fool a body-wide scan).
    const input = document.querySelector('input');
    if (input) return false; // still playing

    // Look for emoji/icon win signals in small contained elements only
    const candidates = document.querySelectorAll('h1,h2,h3,h4,[class*="result"],[class*="correct"],[class*="success"],[class*="win"]');
    for (const el of candidates) {
      if (/🎉|✓|✅/.test(el.textContent)) return true;
    }
    // Fallback: check for a score display appearing (pts earned this round)
    const scoreEls = document.querySelectorAll('[class*="score"],[class*="point"],[class*="pts"]');
    for (const el of scoreEls) {
      if (/\d+\s*pt/i.test(el.textContent)) return true;
    }
    return false;
  }

  function onGuessAttempt() {
    const input = document.querySelector('input');
    if (!input || !input.value.trim()) return;
    const valueAtSubmit = input.value;
    const idxAtSubmit = getClueIndex();

    setTimeout(() => {
      const input2 = document.querySelector('input');
      // If input is still there but now empty → wrong guess (game cleared it)
      if (input2 && !input2.value.trim() && !isWinState()) {
        // Also verify clue index didn't advance (that would be a skip, not wrong guess)
        const idxNow = getClueIndex();
        if (idxNow === idxAtSubmit) {
          triggerWrongFeedback();
        }
      }
    }, 120);
  }

  // Hook into Enter key and any button that looks like "Guess"
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') onGuessAttempt();
  }, true);

  document.addEventListener('click', (e) => {
    const el = e.target;
    const text = (el.textContent || '').trim().toLowerCase();
    if (text === 'guess' || text === 'submit' || el.type === 'submit') {
      onGuessAttempt();
    }
  }, true);

  // Start DOM observer
  function startObserving() {
    const root = document.getElementById('root') || document.body;
    msgObserver.observe(root, { childList: true, subtree: true });
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', startObserving);
  } else {
    startObserving();
  }
})();
</script>

<script>
/**
 * THE TAPE — Improvement #5: Autocomplete dropdown width fix
 *
 * The game's autocomplete dropdown is sized to the full input+button row,
 * so it clips at ~right: 58px (the skip button width). This fix watches
 * for the dropdown appearing and snaps its width to match the input field
 * alone — not the combined row — so long player names never get truncated.
 *
 * Strategy: MutationObserver watches for a dropdown-like element appearing
 * (a positioned list/div beneath the input). When found, we measure the
 * input's bounding rect and apply matching left/width to the dropdown.
 */
(function () {

  function getInput() {
    return document.querySelector('input[type="text"], input:not([type])');
  }

  function looksLikeDropdown(el) {
    if (el.nodeType !== 1) return false;
    const tag = el.tagName.toLowerCase();
    if (tag !== 'ul' && tag !== 'div' && tag !== 'ol') return false;
    const cs = window.getComputedStyle(el);
    // Dropdowns are absolutely/fixed positioned and have multiple children
    if (cs.position !== 'absolute' && cs.position !== 'fixed') return false;
    if (el.children.length < 1) return false;
    // Should be near the top of the viewport or near the input
    const rect = el.getBoundingClientRect();
    if (rect.width < 100) return false;
    return true;
  }

  function fixDropdown(dropdown) {
    const input = getInput();
    if (!input) return;

    const inputRect = input.getBoundingClientRect();
    const dropRect  = dropdown.getBoundingClientRect();

    // Only fix if dropdown is wider than input (the clipping case)
    if (dropRect.width <= inputRect.width + 4) return;

    // Get the dropdown's offset parent for positioning math
    const offsetParent = dropdown.offsetParent || document.body;
    const parentRect = offsetParent.getBoundingClientRect();

    const newLeft  = inputRect.left - parentRect.left;
    const newWidth = inputRect.width;

    Object.assign(dropdown.style, {
      left:     newLeft + 'px',
      width:    newWidth + 'px',
      minWidth: newWidth + 'px',
      maxWidth: newWidth + 'px',
      boxSizing: 'border-box',
    });

    dropdown.dataset.tapeDropdownFixed = '1';
  }

  // Also refix on window resize (orientation change on mobile)
  function refixAll() {
    document.querySelectorAll('[data-tape-dropdown-fixed]').forEach(el => {
      el.removeAttribute('data-tape-dropdown-fixed');
      fixDropdown(el);
    });
  }
  window.addEventListener('resize', refixAll, { passive: true });

  const observer = new MutationObserver((mutations) => {
    for (const mutation of mutations) {
      for (const node of mutation.addedNodes) {
        if (node.nodeType !== 1) continue;

        // Check the node itself
        if (looksLikeDropdown(node) && !node.dataset.tapeDropdownFixed) {
          fixDropdown(node);
        }

        // Check immediate children (some frameworks wrap the list)
        for (const child of node.children) {
          if (looksLikeDropdown(child) && !child.dataset.tapeDropdownFixed) {
            fixDropdown(child);
          }
        }
      }
    }
  });

  function startObserving() {
    const root = document.getElementById('root') || document.body;
    observer.observe(root, { childList: true, subtree: true });
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', startObserving);
  } else {
    startObserving();
  }
})();
</script>

<script>
/**
 * THE TAPE — Improvement #6: Give Up confirmation guard
 *
 * Intercepts clicks on the "Give Up" button and shows a small inline
 * confirmation tooltip before letting the action through. Prevents
 * accidental surrenders when the button is near the Guess button.
 *
 * UX: first click → tooltip appears ("Give up? You'll score 0 pts · Yes / Cancel")
 *     "Yes" click  → lets the original button action fire
 *     "Cancel" or click-away → dismisses, game continues
 *
 * No modals, no blocking overlays — just a compact pill anchored above the button.
 */
(function () {
  const GOLD       = '#C8A96E';
  const RED        = '#F87171';
  const BG         = '#1A1814';
  const BORDER     = 'rgba(255,255,255,0.10)';

  let tooltip      = null;
  let pendingBtn   = null;
  let dismissTimer = null;

  function removeTooltip() {
    if (tooltip) { tooltip.remove(); tooltip = null; }
    pendingBtn = null;
    clearTimeout(dismissTimer);
  }

  function buildTooltip(btn) {
    const wrap = document.createElement('div');
    Object.assign(wrap.style, {
      position:       'absolute',
      zIndex:         '99999',
      background:     BG,
      border:         `1px solid ${BORDER}`,
      borderRadius:   '8px',
      padding:        '8px 12px',
      display:        'flex',
      alignItems:     'center',
      gap:            '10px',
      fontFamily:     "'Space Mono', monospace",
      fontSize:       '0.60rem',
      letterSpacing:  '0.05em',
      whiteSpace:     'nowrap',
      boxShadow:      '0 4px 16px rgba(0,0,0,0.5)',
      pointerEvents:  'all',
    });

    // Message
    const msg = document.createElement('span');
    msg.textContent = "Give up? You'll score 0 pts";
    msg.style.color = '#8A8070';
    wrap.appendChild(msg);

    // Yes button
    const yes = document.createElement('button');
    yes.textContent = 'Yes';
    Object.assign(yes.style, {
      background:     RED,
      color:          '#fff',
      border:         'none',
      borderRadius:   '5px',
      padding:        '3px 10px',
      fontFamily:     'inherit',
      fontSize:       'inherit',
      letterSpacing:  'inherit',
      cursor:         'pointer',
    });
    yes.addEventListener('click', (e) => {
      e.stopPropagation();
      const target = pendingBtn;
      removeTooltip();
      if (target) target.click(); // fire the real Give Up
    });
    wrap.appendChild(yes);

    // Cancel button
    const cancel = document.createElement('button');
    cancel.textContent = 'Cancel';
    Object.assign(cancel.style, {
      background:     'transparent',
      color:          GOLD,
      border:         `1px solid rgba(200,169,110,0.3)`,
      borderRadius:   '5px',
      padding:        '3px 10px',
      fontFamily:     'inherit',
      fontSize:       'inherit',
      letterSpacing:  'inherit',
      cursor:         'pointer',
    });
    cancel.addEventListener('click', (e) => {
      e.stopPropagation();
      removeTooltip();
    });
    wrap.appendChild(cancel);

    // Position above the button
    document.body.appendChild(wrap);
    const btnRect  = btn.getBoundingClientRect();
    const tipRect  = wrap.getBoundingClientRect();
    const scrollY  = window.scrollY || 0;
    const scrollX  = window.scrollX || 0;

    wrap.style.top  = (btnRect.top + scrollY - tipRect.height - 8) + 'px';
    wrap.style.left = (btnRect.left + scrollX + btnRect.width / 2 - tipRect.width / 2) + 'px';

    // Auto-dismiss after 4s if no interaction
    dismissTimer = setTimeout(removeTooltip, 4000);

    return wrap;
  }

  function looksLikeGiveUp(el) {
    const text = (el.textContent || '').trim().toLowerCase();
    return text === 'give up' || text === 'give up?' || text === 'forfeit' || text === 'quit';
  }

  // Intercept at capture phase so we get it before React's handler
  document.addEventListener('click', (e) => {
    const el = e.target;

    // If clicking Yes/Cancel inside our tooltip — let those handlers run
    if (tooltip && tooltip.contains(el)) return;

    // If clicking anywhere else while tooltip is open — dismiss
    if (tooltip) { removeTooltip(); return; }

    // Check if it's a Give Up button
    if (looksLikeGiveUp(el) || (el.closest && looksLikeGiveUp(el.closest('button, [role="button"]') || {}))) {
      e.stopPropagation();
      e.preventDefault();
      pendingBtn = el.closest('button, [role="button"]') || el;
      tooltip = buildTooltip(pendingBtn);
    }
  }, true);

  // Reposition on scroll/resize
  window.addEventListener('scroll',  () => { if (tooltip) removeTooltip(); }, { passive: true });
  window.addEventListener('resize',  () => { if (tooltip) removeTooltip(); }, { passive: true });

  // Poll: dismiss tooltip if round advances unexpectedly (timer, auto-skip, etc.)
  let tooltipOpenClueIdx = -1;
  const _origBuildTooltip = buildTooltip;
  setInterval(() => {
    if (!tooltip) { tooltipOpenClueIdx = -1; return; }
    // Get current clue index
    const allEls = document.querySelectorAll('span, div');
    let idx = -1;
    for (const el of allEls) {
      const m = el.textContent.trim().match(/^(\d)\/6$/);
      if (m) { idx = parseInt(m[1], 10) - 1; break; }
    }
    if (tooltipOpenClueIdx === -1) { tooltipOpenClueIdx = idx; return; }
    // If clue index changed or input disappeared → round moved on
    if (idx !== tooltipOpenClueIdx || !document.querySelector('input')) {
      removeTooltip();
      tooltipOpenClueIdx = -1;
    }
  }, 400);
})();
</script>

<script>
/**
 * THE TAPE — Improvement #7: Player name in share text
 *
 * After a correct guess the game shows a share button that copies an emoji
 * grid score to the clipboard. This patch intercepts that copy and prepends
 * the player's name so the share reads like:
 *
 *   The Tape — I got Kobe Bryant in 2 clues! 🎯
 *   🟩⬜⬜⬜⬜  · 4 pts
 *   #TheTape #NBA
 *
 * Strategy:
 *   1. Watch for the correct-guess state (input disappears + success text).
 *   2. At that moment, scrape the player name from the DOM (the game
 *      reveals it in a heading/result card after a correct guess).
 *   3. Intercept navigator.clipboard.writeText and the deprecated
 *      document.execCommand('copy') to prepend our line.
 *   4. Also patch any share button's click to inject the name into
 *      whatever text the game was about to copy.
 */
(function () {
  let confirmedPlayerName = null;

  // ── Scrape player name from DOM ──────────────────────────────────────────

  function scrapePlayerName() {
    // Cross-reference against the playerPool harvested by script #9 if available.
    // This prevents UI strings like "Nice Work!" or "Daily Score" from matching.
    const knownPlayers = window.__tapePlayerPool__ || null;

    function isKnownPlayer(name) {
      if (!knownPlayers || knownPlayers.size === 0) return true; // pool empty, allow all
      // Case-insensitive check
      const lower = name.toLowerCase();
      for (const p of knownPlayers) {
        if (p.toLowerCase() === lower) return true;
      }
      return false;
    }

    const headings = document.querySelectorAll('h1, h2, h3, h4, [class*="name"], [class*="player"], [class*="result"], [class*="answer"]');
    for (const el of headings) {
      const t = el.textContent.trim();
      if (t.length >= 5 && t.length <= 35 && /^[A-Z][a-záéíóú]/.test(t) && t.split(' ').length >= 2) {
        if (isKnownPlayer(t)) return t;
      }
    }

    // Fallback: leaf text nodes matching player name pattern
    const allEls = document.querySelectorAll('div, span, p');
    for (const el of allEls) {
      const t = el.textContent.trim();
      if (t.length >= 5 && t.length <= 35 &&
          /^[A-Z][a-z]+ [A-Z][a-z]/.test(t) &&
          el.children.length === 0 &&
          isKnownPlayer(t)) {
        return t;
      }
    }
    return null;
  }

  // ── Watch for win state ───────────────────────────────────────────────────

  let wasPlaying = false;

  function checkWinState() {
    const input = document.querySelector('input');
    const isPlaying = !!input;

    if (wasPlaying && !isPlaying) {
      // Transition: was playing, now no input — round ended
      // Give React a tick to render the result
      setTimeout(() => {
        const name = scrapePlayerName();
        if (name) confirmedPlayerName = name;
      }, 300);
    }

    wasPlaying = isPlaying;
  }

  setInterval(checkWinState, 400);

  // ── Intercept clipboard writes ────────────────────────────────────────────

  function injectPlayerName(text) {
    if (!confirmedPlayerName) return text;
    if (!text || typeof text !== 'string') return text;

    // Only inject if this looks like the game's share text (has emoji blocks)
    if (!/[🟩🟨⬛⬜]/.test(text)) return text;

    // Don't double-inject
    if (text.includes(confirmedPlayerName)) return text;

    const header = `The Tape — I got ${confirmedPlayerName}! 🎯`;
    return header + '\n' + text;
  }

  // Patch navigator.clipboard.writeText
  if (navigator.clipboard && navigator.clipboard.writeText) {
    const origWrite = navigator.clipboard.writeText.bind(navigator.clipboard);
    navigator.clipboard.writeText = function (text) {
      return origWrite(injectPlayerName(text));
    };
  }

  // Patch document.execCommand for older clipboard path
  const origExecCommand = document.execCommand.bind(document);
  document.execCommand = function (cmd, ...args) {
    if (cmd === 'copy') {
      const sel = window.getSelection();
      if (sel && sel.toString()) {
        const patched = injectPlayerName(sel.toString());
        if (patched !== sel.toString()) {
          // Replace selection text then let execCommand fire
          const ta = document.createElement('textarea');
          ta.value = patched;
          ta.style.cssText = 'position:fixed;opacity:0;top:0;left:0';
          document.body.appendChild(ta);
          ta.select();
          const result = origExecCommand('copy');
          ta.remove();
          return result;
        }
      }
    }
    return origExecCommand(cmd, ...args);
  };

  // ── Also patch share button click as a belt-and-suspenders ───────────────
  // Some games use a custom share flow rather than raw clipboard API.

  document.addEventListener('click', (e) => {
    const el = e.target;
    const text = (el.textContent || '').trim().toLowerCase();
    const isShareBtn = text.includes('share') || text.includes('copy') ||
                       el.getAttribute('aria-label')?.toLowerCase().includes('share');
    if (!isShareBtn || !confirmedPlayerName) return;

    // Give the game's own handler 50ms to write to clipboard, then patch it
    setTimeout(async () => {
      try {
        const current = await navigator.clipboard.readText();
        if (current && /[🟩🟨⬛⬜]/.test(current) && !current.includes(confirmedPlayerName)) {
          await navigator.clipboard.writeText(injectPlayerName(current));
        }
      } catch (_) {
        // Clipboard read requires permission — silent fail is fine,
        // the writeText patch above already handles most cases
      }
    }, 50);
  }, true);
})();
</script>

<script>
/**
 * THE TAPE — Improvement #8: Streak counter
 *
 * Tracks current streak and best streak in localStorage.
 * A "streak" = consecutive daily puzzles solved (at least one correct guess).
 * Shows a compact badge in the top-right corner of the screen.
 *
 * Storage keys:
 *   tape_streak_current  — number, current consecutive days
 *   tape_streak_best     — number, all-time best streak
 *   tape_streak_lastDate — ISO date string (YYYY-MM-DD) of last solved day
 *
 * Logic:
 *   - On a correct guess today: increment streak if last solve was yesterday
 *     (or today already), otherwise reset to 1.
 *   - On Give Up / round end without correct: streak breaks (reset to 0).
 *   - In endless mode we don't touch the streak (no date concept).
 */
(function () {
  const GOLD       = '#C8A96E';
  const GOLD_DIM   = 'rgba(200,169,110,0.15)';
  const GOLD_BORDER= 'rgba(200,169,110,0.25)';
  const KEY_CUR    = 'tape_streak_current';
  const KEY_BEST   = 'tape_streak_best';
  const KEY_DATE   = 'tape_streak_lastDate';

  // ── localStorage helpers ─────────────────────────────────────────────────

  function getStreak() {
    return {
      current: parseInt(localStorage.getItem(KEY_CUR)  || '0', 10),
      best:    parseInt(localStorage.getItem(KEY_BEST) || '0', 10),
      lastDate: localStorage.getItem(KEY_DATE) || '',
    };
  }

  function saveStreak(current, best, date) {
    localStorage.setItem(KEY_CUR,  String(current));
    localStorage.setItem(KEY_BEST, String(best));
    localStorage.setItem(KEY_DATE, date);
  }

  function todayISO() {
    return new Date().toISOString().slice(0, 10);
  }

  function yesterdayISO() {
    const d = new Date();
    d.setDate(d.getDate() - 1);
    return d.toISOString().slice(0, 10);
  }

  function isDailyMode() {
    // Daily mode URL typically contains /daily or no path segment
    // Endless mode typically has /endless or a query param
    const url = location.href.toLowerCase();
    if (url.includes('endless') || url.includes('infinite')) return false;
    return true; // default assume daily
  }

  // ── Badge UI ─────────────────────────────────────────────────────────────

  let badgeEl = null;

  function makeBadge() {
    const el = document.createElement('div');
    el.id = 'tape-streak-badge';
    Object.assign(el.style, {
      position:       'fixed',
      top:            '12px',
      right:          '12px',
      zIndex:         '9997',
      display:        'flex',
      flexDirection:  'column',
      alignItems:     'flex-end',
      gap:            '2px',
      background:     GOLD_DIM,
      border:         `1px solid ${GOLD_BORDER}`,
      borderRadius:   '8px',
      padding:        '6px 10px 5px',
      fontFamily:     "'Space Mono', monospace",
      fontSize:       '0.60rem',
      letterSpacing:  '0.06em',
      pointerEvents:  'none',
      backdropFilter: 'blur(6px)',
      WebkitBackdropFilter: 'blur(6px)',
      transition:     'opacity 0.3s ease',
    });

    const fire = document.createElement('div');
    fire.id = 'tape-streak-fire';
    Object.assign(fire.style, {
      fontSize:    '0.75rem',
      lineHeight:  '1',
      textAlign:   'right',
    });
    el.appendChild(fire);

    const cur = document.createElement('div');
    cur.id = 'tape-streak-cur';
    Object.assign(cur.style, { color: GOLD, lineHeight: '1.3' });
    el.appendChild(cur);

    const best = document.createElement('div');
    best.id = 'tape-streak-best';
    Object.assign(best.style, { color: '#5C5448', lineHeight: '1.3' });
    el.appendChild(best);

    document.body.appendChild(el);
    return el;
  }

  function renderBadge() {
    if (!badgeEl) badgeEl = makeBadge();
    const { current, best } = getStreak();

    const fireEl = document.getElementById('tape-streak-fire');
    const curEl  = document.getElementById('tape-streak-cur');
    const bestEl = document.getElementById('tape-streak-best');

    fireEl.textContent = current >= 3 ? '🔥' : current >= 1 ? '✦' : '–';
    curEl.textContent  = `${current} day streak`;
    bestEl.textContent = `best ${best}`;
  }

  // ── Streak logic ─────────────────────────────────────────────────────────

  let wasPlaying   = false;
  let wonThisRound = false;
  let streakUpdatedToday = false;

  // Check if we already updated the streak for today (avoid double-counting
  // if they play multiple rounds or refresh)
  function alreadyUpdatedToday() {
    return getStreak().lastDate === todayISO();
  }

  function recordWin() {
    if (!isDailyMode()) return;
    if (streakUpdatedToday) return;
    streakUpdatedToday = true;

    const { current, best, lastDate } = getStreak();
    const today = todayISO();

    let newCurrent;
    if (lastDate === today) {
      // Already counted today (e.g. page refresh mid-session)
      newCurrent = current;
    } else if (lastDate === yesterdayISO()) {
      // Consecutive day — extend streak
      newCurrent = current + 1;
    } else {
      // Gap in days — reset
      newCurrent = 1;
    }

    const newBest = Math.max(newCurrent, best);
    saveStreak(newCurrent, newBest, today);
    renderBadge();
    flashBadge();
  }

  function recordLoss() {
    if (!isDailyMode()) return;
    if (alreadyUpdatedToday()) return; // already won today, don't overwrite
    if (streakUpdatedToday) return;
    streakUpdatedToday = true;

    const { best } = getStreak();
    saveStreak(0, best, todayISO());
    renderBadge();
  }

  function flashBadge() {
    if (!badgeEl) return;
    badgeEl.style.background = `rgba(200,169,110,0.30)`;
    badgeEl.style.borderColor = GOLD;
    setTimeout(() => {
      if (badgeEl) {
        badgeEl.style.background = GOLD_DIM;
        badgeEl.style.borderColor = GOLD_BORDER;
      }
    }, 800);
  }

  // ── Win/loss detection ────────────────────────────────────────────────────

  function isWin() {
    // Scoped check — don't scan all body text to avoid matching clue content
    const candidates = document.querySelectorAll('h1,h2,h3,h4,[class*="result"],[class*="correct"],[class*="success"],[class*="win"]');
    for (const el of candidates) {
      if (/🎉|✓|✅/.test(el.textContent)) return true;
    }
    const scoreEls = document.querySelectorAll('[class*="score"],[class*="point"],[class*="pts"]');
    for (const el of scoreEls) {
      if (/\d+\s*pt/i.test(el.textContent)) return true;
    }
    return false;
  }

  function poll() {
    const input     = document.querySelector('input');
    const isPlaying = !!input;

    if (isPlaying) {
      wasPlaying = true;
    }

    if (wasPlaying && !isPlaying) {
      // Round just ended
      if (isWin()) {
        wonThisRound = true;
        recordWin();
      } else {
        recordLoss();
      }
      wasPlaying = false;
    }
  }

  // ── Init ─────────────────────────────────────────────────────────────────

  // On load, check if streak is already broken (last date wasn't yesterday or today)
  function initStreak() {
    const { lastDate, current, best } = getStreak();
    const today     = todayISO();
    const yesterday = yesterdayISO();

    // If they haven't played since before yesterday, streak is broken
    if (current > 0 && lastDate && lastDate !== today && lastDate !== yesterday) {
      saveStreak(0, best, lastDate); // preserve best, reset current
    }

    // If already updated today (refresh), flag it
    if (lastDate === today) streakUpdatedToday = true;

    renderBadge();
  }

  setInterval(poll, 400);
  setTimeout(initStreak, 600);
})();
</script>

<script>
/**
 * THE TAPE — Improvement #9: Hint system
 *
 * Adds a "Hint" button near the guess input. Tapping it reveals one
 * letter of the current player's last name (first unrevealed position).
 * Costs 1 point — shown as a warning before confirming.
 *
 * Since we can't read the answer from obfuscated JS, we use a different
 * approach: we intercept the autocomplete suggestions to infer the player
 * pool, and use a MutationObserver to catch when the game's own answer
 * text appears (post-reveal) to build a running answer map.
 *
 * Hint display: a small masked name strip appears below the input, e.g.:
 *   _ _ _ _ _ _   _ _ _ _ _ _
 * Letters reveal one at a time as hints are used.
 *
 * Because we can't know the answer ahead of time, the hint works by
 * watching the autocomplete list — if only one player matches a partial
 * pattern, that IS the answer. We track the full player list from the
 * autocomplete suggestions over time.
 */
(function () {
  const GOLD        = '#C8A96E';
  const GOLD_DIM    = 'rgba(200,169,110,0.12)';
  const GOLD_BORDER = 'rgba(200,169,110,0.30)';
  const RED         = '#F87171';

  // ── Player list harvesting ────────────────────────────────────────────────
  // We build a running set of all player names seen in autocomplete dropdowns.

  const playerPool = new Set();
  window.__tapePlayerPool__ = playerPool; // expose for script #7 scrapePlayerName

  function harvestDropdown(el) {
    if (!el || el.nodeType !== 1) return;
    const items = el.querySelectorAll('li, [role="option"], [role="listitem"]');
    items.forEach(item => {
      const t = item.textContent.trim();
      if (t.length >= 5 && t.length <= 35 && /^[A-Z]/.test(t) && t.includes(' ')) {
        playerPool.add(t);
      }
    });
  }

  // ── Current round state ───────────────────────────────────────────────────

  let currentPlayer  = null;  // { first: string, last: string, full: string }
  let revealedIdx    = [];     // indices already revealed in last name
  let hintCount      = 0;
  let hintStrip      = null;
  let hintBtn        = null;
  let hintInjected   = false;
  let ptsDeducted    = 0;

  function resetRound() {
    currentPlayer = null;
    revealedIdx   = [];
    hintCount     = 0;
    ptsDeducted   = 0;
    hintInjected  = false;
    if (hintStrip) { hintStrip.remove(); hintStrip = null; }
    if (hintBtn)   { hintBtn.remove();   hintBtn   = null; }
  }

  // ── Infer current player from autocomplete ────────────────────────────────
  // When the user types something, narrow the pool to see if one player
  // matches the typed prefix — that's a strong signal.

  function inferPlayerFromInput(inputVal) {
    if (!inputVal || inputVal.length < 2) return null;
    const lower = inputVal.toLowerCase();
    const matches = [...playerPool].filter(p => p.toLowerCase().startsWith(lower));
    if (matches.length === 1) return matches[0];
    return null;
  }

  // ── Hint strip UI ─────────────────────────────────────────────────────────

  function makeHintStrip(playerName) {
    const parts  = playerName.trim().split(/\s+/);
    const last   = parts[parts.length - 1];

    const wrap = document.createElement('div');
    wrap.id = 'tape-hint-strip';
    Object.assign(wrap.style, {
      display:        'flex',
      alignItems:     'center',
      justifyContent: 'center',
      gap:            '6px',
      marginTop:      '6px',
      fontFamily:     "'Space Mono', monospace",
      fontSize:       '0.75rem',
      letterSpacing:  '0.18em',
      color:          GOLD,
      flexWrap:       'wrap',
    });

    // Render blanks for each letter of last name
    for (let i = 0; i < last.length; i++) {
      const cell = document.createElement('span');
      cell.id    = `tape-hint-cell-${i}`;
      cell.textContent = revealedIdx.includes(i) ? last[i].toUpperCase() : '_';
      Object.assign(cell.style, {
        display:      'inline-block',
        minWidth:     '12px',
        textAlign:    'center',
        borderBottom: `1px solid ${GOLD_BORDER}`,
        paddingBottom:'1px',
        color:        revealedIdx.includes(i) ? GOLD : '#3A3530',
        transition:   'color 0.3s ease',
      });
      wrap.appendChild(cell);
    }

    return wrap;
  }

  function updateHintStrip(playerName) {
    const parts = playerName.trim().split(/\s+/);
    const last  = parts[parts.length - 1];
    for (let i = 0; i < last.length; i++) {
      const cell = document.getElementById(`tape-hint-cell-${i}`);
      if (!cell) continue;
      if (revealedIdx.includes(i)) {
        cell.textContent = last[i].toUpperCase();
        cell.style.color = GOLD;
      }
    }
  }

  // ── Hint button ───────────────────────────────────────────────────────────

  function makeHintBtn() {
    const btn = document.createElement('button');
    btn.id          = 'tape-hint-btn';
    btn.textContent = 'Hint  −1pt';
    Object.assign(btn.style, {
      background:    GOLD_DIM,
      border:        `1px solid ${GOLD_BORDER}`,
      borderRadius:  '6px',
      color:         GOLD,
      fontFamily:    "'Space Mono', monospace",
      fontSize:      '0.55rem',
      letterSpacing: '0.08em',
      padding:       '4px 10px',
      cursor:        'pointer',
      marginTop:     '8px',
      display:       'block',
      marginLeft:    'auto',
      marginRight:   'auto',
      transition:    'opacity 0.2s',
    });

    btn.addEventListener('mouseenter', () => btn.style.opacity = '0.75');
    btn.addEventListener('mouseleave', () => btn.style.opacity = '1');

    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      fireHint();
    });

    return btn;
  }

  function fireHint() {
    if (!currentPlayer) {
      // Try to infer from current input value
      const input = document.querySelector('input');
      const val   = input ? input.value.trim() : '';
      const inferred = val ? inferPlayerFromInput(val) : null;
      if (inferred) {
        setCurrentPlayer(inferred);
      } else {
        // Can't hint without knowing the player — show a note
        showHintUnavailable();
        return;
      }
    }

    const parts = currentPlayer.last;

    // Build hint strip now if it doesn't exist yet (e.g. user clicked Hint before typing)
    if (!hintStrip && hintBtn && hintBtn.parentElement) {
      hintStrip = makeHintStrip(currentPlayer.full);
      hintBtn.parentElement.insertBefore(hintStrip, hintBtn);
    }

    // Find first unrevealed non-space index
    const nextIdx = [...Array(parts.length).keys()].find(
      i => !revealedIdx.includes(i) && parts[i] !== ' ' && parts[i] !== '-'
    );

    if (nextIdx === undefined) return; // all revealed

    revealedIdx.push(nextIdx);
    hintCount++;
    ptsDeducted++;

    if (hintStrip) {
      updateHintStrip(currentPlayer.full);
    }

    // Update button label — hintCount is already incremented, use it directly
    if (hintBtn) {
      const remaining = parts.length - revealedIdx.length;
      if (remaining <= 0) {
        hintBtn.textContent = 'No more hints';
        hintBtn.style.opacity = '0.4';
        hintBtn.style.pointerEvents = 'none';
      } else {
        hintBtn.textContent = `Hint  −${hintCount + 1}pt`; // next hint will cost hintCount+1
      }
    }
  }

  function showHintUnavailable() {
    if (!hintBtn) return;
    const orig = hintBtn.textContent;
    hintBtn.textContent = 'Type a name first';
    hintBtn.style.color = RED;
    setTimeout(() => {
      if (hintBtn) { hintBtn.textContent = orig; hintBtn.style.color = GOLD; }
    }, 1500);
  }

  function setCurrentPlayer(fullName) {
    const parts = fullName.trim().split(/\s+/);
    currentPlayer = {
      full:  fullName,
      first: parts.slice(0, -1).join(' '),
      last:  parts[parts.length - 1],
    };
  }

  // ── Inject hint UI below the input row ───────────────────────────────────

  function injectHintUI() {
    if (hintInjected) return;
    const input = document.querySelector('input');
    if (!input) return;

    // Find a suitable parent container to append into
    let container = input.parentElement;
    for (let i = 0; i < 4; i++) {
      if (!container || container === document.body) break;
      // Walk up until we find something that's a column-like flex or block container
      const cs = window.getComputedStyle(container);
      if ((cs.display === 'flex' && cs.flexDirection === 'column') || cs.display === 'block') break;
      container = container.parentElement;
    }
    if (!container || container === document.body) container = input.parentElement;

    hintBtn   = makeHintBtn();
    container.appendChild(hintBtn);
    hintInjected = true;
  }

  // ── Input watcher — infer player as user types ────────────────────────────

  document.addEventListener('input', (e) => {
    if (e.target.tagName !== 'INPUT') return;
    const val = e.target.value.trim();
    if (val.length >= 3 && !currentPlayer) {
      const inferred = inferPlayerFromInput(val);
      if (inferred) {
        setCurrentPlayer(inferred);
        // Build hint strip now that we know the player
        if (hintBtn && !hintStrip) {
          hintStrip = makeHintStrip(currentPlayer.full);
          hintBtn.parentElement && hintBtn.parentElement.insertBefore(hintStrip, hintBtn);
        }
      }
    }
  }, true);

  // ── MutationObserver — harvest autocomplete + inject UI ──────────────────

  const observer = new MutationObserver((mutations) => {
    for (const m of mutations) {
      for (const node of m.addedNodes) {
        if (node.nodeType !== 1) continue;
        harvestDropdown(node);
        for (const child of node.querySelectorAll('ul, [role="listbox"]')) {
          harvestDropdown(child);
        }
      }
    }
  });

  // ── Main poll ─────────────────────────────────────────────────────────────

  let prevHadInput = false;

  function poll() {
    const input = document.querySelector('input');
    const hasInput = !!input;

    if (!prevHadInput && hasInput) {
      // New round started
      resetRound();
      setTimeout(injectHintUI, 300);
    }

    if (prevHadInput && !hasInput) {
      // Round ended — clean up after a beat
      setTimeout(() => {
        if (hintBtn)   { hintBtn.remove();   hintBtn   = null; }
        if (hintStrip) { hintStrip.remove(); hintStrip = null; }
        hintInjected = false;
      }, 500);
    }

    prevHadInput = hasInput;

    // Inject on first load too
    if (hasInput && !hintInjected) injectHintUI();
  }

  function startObserving() {
    const root = document.getElementById('root') || document.body;
    observer.observe(root, { childList: true, subtree: true });
  }

  setInterval(poll, 400);
  setTimeout(startObserving, 500);
})();
</script>

<script>
/**
 * THE TAPE — Improvement #10: Era tagging on Background clue
 *
 * Scans the Background clue card text for draft year / career year signals
 * and injects a small era badge so players can orient themselves quickly.
 *
 * Era bands:
 *   Classic  — drafted/played before 1980
 *   80s      — 1980–1989
 *   90s      — 1990–1999
 *   2000s    — 2000–2009
 *   2010s    — 2010–2019
 *   Modern   — 2020–present
 *
 * Detection: scan Background clue text for 4-digit years, pick the earliest
 * one that looks like a draft/career year (1960–present).
 * Fallback: scan for decade references ("late nineties", "early 2000s" etc.)
 */
(function () {
  const GOLD        = '#C8A96E';
  const GOLD_DIM    = 'rgba(200,169,110,0.10)';
  const GOLD_BORDER = 'rgba(200,169,110,0.28)';

  const ERA_BANDS = [
    { label: 'Classic',  from: 0,    to: 1979, color: '#A0C4FF', bg: 'rgba(160,196,255,0.10)', border: 'rgba(160,196,255,0.28)' },
    { label: '80s',      from: 1980, to: 1989, color: '#FFD6A5', bg: 'rgba(255,214,165,0.10)', border: 'rgba(255,214,165,0.28)' },
    { label: '90s',      from: 1990, to: 1999, color: '#CAFFBF', bg: 'rgba(202,255,191,0.10)', border: 'rgba(202,255,191,0.28)' },
    { label: '2000s',    from: 2000, to: 2009, color: '#FFADAD', bg: 'rgba(255,173,173,0.10)', border: 'rgba(255,173,173,0.28)' },
    { label: '2010s',    from: 2010, to: 2019, color: '#BDB2FF', bg: 'rgba(189,178,255,0.10)', border: 'rgba(189,178,255,0.28)' },
    { label: 'Modern',   from: 2020, to: 9999, color: GOLD,      bg: GOLD_DIM,                border: GOLD_BORDER              },
  ];

  const DECADE_WORDS = {
    'sixties|60s':          1962,
    'seventies|70s':        1972,
    'eighties|80s':         1982,
    'nineties|90s':         1992,
    'two thousands|2000s':  2002,
    'twenty tens|2010s':    2012,
    'twenty twenties|2020s':2022,
  };

  function getEraForYear(year) {
    return ERA_BANDS.find(b => year >= b.from && year <= b.to) || null;
  }

  function inferYearFromText(text) {
    // 1. Explicit 4-digit years in range 1960–2030
    const years = [...text.matchAll(/(19[6-9]\d|20[0-2]\d)/g)]
      .map(m => parseInt(m[1], 10))
      .filter(y => y >= 1960 && y <= 2030);

    if (years.length > 0) return Math.min(...years);

    // 2. Decade words fallback
    const lower = text.toLowerCase();
    for (const [pattern, year] of Object.entries(DECADE_WORDS)) {
      if (new RegExp(pattern).test(lower)) return year;
    }

    return null;
  }

  function isBackgroundCard(el) {
    return /BACKGROUND/i.test(el.textContent);
  }

  function alreadyTagged(card) {
    return !!card.querySelector('#tape-era-badge');
  }

  function makeBadge(era) {
    const badge = document.createElement('span');
    badge.id = 'tape-era-badge';
    badge.textContent = era.label;
    Object.assign(badge.style, {
      display:       'inline-block',
      marginLeft:    '8px',
      padding:       '1px 7px',
      borderRadius:  '4px',
      background:    era.bg,
      border:        `1px solid ${era.border}`,
      color:         era.color,
      fontFamily:    "'Space Mono', monospace",
      fontSize:      '0.55rem',
      letterSpacing: '0.10em',
      verticalAlign: 'middle',
      pointerEvents: 'none',
      whiteSpace:    'nowrap',
    });
    return badge;
  }

  function tryTagCard(card) {
    if (alreadyTagged(card)) return;

    const text = card.textContent || '';
    if (!isBackgroundCard(card)) return;

    const year = inferYearFromText(text);
    if (!year) return;

    const era = getEraForYear(year);
    if (!era) return;

    // Find the "BACKGROUND" label element to append the badge next to
    const allChildren = card.querySelectorAll('*');
    for (const el of allChildren) {
      if (el.textContent.trim() === 'BACKGROUND' && el.children.length === 0) {
        el.appendChild(makeBadge(era));
        return;
      }
    }

    // Fallback: append to card itself
    card.appendChild(makeBadge(era));
  }

  // ── Scan existing cards + watch for new ones ──────────────────────────────

  function scanAllCards() {
    const candidates = document.querySelectorAll('div, section, article');
    for (const el of candidates) {
      if (isBackgroundCard(el) && !alreadyTagged(el) && el.children.length >= 1) {
        const year = inferYearFromText(el.textContent);
        if (year) tryTagCard(el);
      }
    }
  }

  let _scanTimer = null;
  const observer = new MutationObserver(() => {
    if (!_scanTimer) _scanTimer = setTimeout(() => { _scanTimer = null; scanAllCards(); }, 80);
  });

  function startObserving() {
    const root = document.getElementById('root') || document.body;
    observer.observe(root, { childList: true, subtree: true });
    scanAllCards();
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', startObserving);
  } else {
    setTimeout(startObserving, 700);
  }
})();
</script>
